<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DWM 閱讀器</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", Arial, sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
}

header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 8px rgba(0,0,0,0.12);
  padding: 10px 14px;
}

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

.left-tools,
.right-tools {
  display: flex;
  align-items: center;
  gap: 8px;
}

.title {
  font-weight: 700;
  font-size: 16px;
}

button {
  border: none;
  border-radius: 999px;
  padding: 9px 14px;
  background: #007aff;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button.secondary {
  background: #e5e5ea;
  color: #1c1c1e;
}

button:active {
  transform: scale(0.97);
}

#pageInfo {
  margin: 8px 0 6px;
  text-align: center;
  font-size: 14px;
  color: #555;
}

.progress {
  width: 100%;
  height: 8px;
  background: #d1d1d6;
  border-radius: 999px;
  overflow: hidden;
}

#bar {
  width: 0%;
  height: 100%;
  background: #34c759;
  transition: width 0.25s ease;
}

.reader-wrap {
  width: 100%;
  padding: 16px;
}

#viewer{

display:flex;

justify-content:center;

padding:20px;

min-height:calc(100vh - 180px);

}

#loading{

position:absolute;

margin-top:120px;

font-size:22px;

color:#666;

}
  canvas {
  display: block;
  margin: 0 auto 90px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  max-width: 100%;
}

.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 25;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px);
  padding: 10px 14px;
  display: flex;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 -1px 10px rgba(0,0,0,0.12);
}

#menuOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 40;
}

#menuOverlay.show {
  display: block;
}

#sideMenu {
  position: fixed;
  top: 0;
  left: -310px;
  width: 300px;
  max-width: 82vw;
  height: 100%;
  background: white;
  z-index: 50;
  box-shadow: 4px 0 20px rgba(0,0,0,0.25);
  transition: left 0.25s ease;
  padding: 18px;
  overflow-y: auto;
}

#sideMenu.show {
  left: 0;
}

#sideMenu h2 {
  margin: 0 0 14px;
  font-size: 22px;
}

.menu-item {
  display: block;
  width: 100%;
  text-align: left;
  background: #f2f2f7;
  color: #1c1c1e;
  margin: 8px 0;
  border-radius: 14px;
  padding: 13px 14px;
}

.menu-item small {
  display: block;
  color: #666;
  margin-top: 4px;
}

.loading {
  text-align: center;
  padding: 40px 20px;
  color: #666;
}

@media (max-width: 600px) {
  header {
    padding: 9px 10px;
  }

  .toolbar {
    justify-content: center;
  }

  .title {
    width: 100%;
    text-align: center;
    order: -1;
    margin-bottom: 4px;
  }

  button {
    padding: 9px 12px;
    font-size: 14px;
  }

  .reader-wrap {
    padding: 10px;
  }

  canvas {
    border-radius: 5px;
    margin-bottom: 88px;
  }
}
</style>
</head>
<body>

<div id="sidebar">

<h2>目錄</h2>

<div id="toc">

<button onclick="goPage(1)">封面</button>
<button onclick="goPage(5)">目錄</button>
<button onclick="goPage(10)">第 1 章</button>
<button onclick="goPage(52)">第 2 章</button>
<button onclick="goPage(79)">第 3 章</button>
<button onclick="goPage(99)">第 4 章</button>
<button onclick="goPage(107)">第 5 章</button>
<button onclick="goPage(122)">附錄</button>

</div>

<header id="topbar">

<div class="left">

<button onclick="toggleMenu()">☰ 目錄</button>

<button onclick="location.href='index.html'">首頁</button>

</div>

<div class="center">

<h2>DWM 圖解抗壓指南</h2>

<div id="pageInfo"></div>

</div>

<div class="right">

<button onclick="prevPage()">上一頁</button>

<button onclick="nextPage()">下一頁</button>

</div>

</header>

<div class="progress">

<div id="bar"></div>

</div>

<div id="viewer">

<div id="loading">
載入 PDF...
</div>

<canvas id="pdfCanvas"></canvas>

</div>
<script>
const pdfUrl = "pdf/DWM.pdf";

let pdfDoc = null;
let pageNum = Number(localStorage.getItem("lastPage")) || 1;
let renderTask = null;

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const pageInfo = document.getElementById("pageInfo");
const bar = document.getElementById("bar");
const loading = document.getElementById("loading");

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
  pdfDoc = pdf;

  if (pageNum < 1) pageNum = 1;
  if (pageNum > pdfDoc.numPages) pageNum = pdfDoc.numPages;

  renderPage(pageNum);
}).catch(function(error) {
  loading.innerHTML = "PDF 載入失敗，請確認 pdf/DWM.pdf 是否存在。";
  console.error(error);
});

function renderPage(num) {
  loading.style.display = "block";

  pdfDoc.getPage(num).then(function(page) {
    const rawViewport = page.getViewport({ scale: 1 });
    const screenWidth = window.innerWidth;
    let targetWidth = screenWidth * 0.94;

    if (screenWidth >= 900) {
      targetWidth = Math.min(880, screenWidth * 0.72);
    }

    const scale = targetWidth / rawViewport.width;
    const viewport = page.getViewport({ scale: scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise.then(function() {
      loading.style.display = "none";
      localStorage.setItem("lastPage", num);
      updateProgress();
    });
  });
}

function updateProgress() {
  const percent = Math.round((pageNum / pdfDoc.numPages) * 100);
  pageInfo.innerHTML = "第 " + pageNum + " / " + pdfDoc.numPages + " 頁｜閱讀進度 " + percent + "%";
  bar.style.width = percent + "%";
}

function nextPage() {
  if (pageNum < pdfDoc.numPages) {
    pageNum++;
    renderPage(pageNum);
  }
}

function prevPage() {
  if (pageNum > 1) {
    pageNum--;
    renderPage(pageNum);
  }
}

function goPage(num) {
  pageNum = num;
  renderPage(pageNum);
  toggleMenu();
}

function toggleMenu() {

    const menu = document.getElementById("sidebar");

    if(menu.style.display==="block"){
        menu.style.display="none";
    }else{
        menu.style.display="block";
    }

}
</script>
</body>
</html>
