<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DWM 閱讀器</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- 如需加上 integrity（SRI）雜湊以防 CDN 被竄改，請到 cdnjs.com 該檔案頁面複製官方提供的 integrity 值，
     不要使用未經查證的雜湊，否則雜湊不符會導致 script 載入失敗 -->

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", Arial, sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
}

button {
  border: none;
  border-radius: 999px;
  padding: 9px 15px;
  background: #007aff;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button.secondary {
  background: #e5e5ea;
  color: #1c1c1e;
}

#topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(14px);
  box-shadow: 0 1px 10px rgba(0,0,0,0.12);
  padding: 10px 14px;
}

.toolbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
}

.leftTools, .rightTools {
  display: flex;
  gap: 8px;
}

.rightTools { justify-content: flex-end; }

.centerTitle {
  text-align: center;
  font-weight: 700;
  font-size: 16px;
  white-space: nowrap;
}

#pageInfoRow {
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 14px;
  color: #555;
}

#pageJumpInput {
  width: 48px;
  text-align: center;
  border: 1px solid #d1d1d6;
  border-radius: 6px;
  padding: 2px 4px;
  font-size: 14px;
  background: white;
  color: #1c1c1e;
}

body.dark #pageJumpInput {
  background: #2a2a2a;
  color: #fff;
  border-color: #444;
}

.progress {
  width: 100%;
  height: 7px;
  background: #d1d1d6;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 8px;
}

#bar {
  width: 0%;
  height: 100%;
  background: #34c759;
  transition: width .2s ease;
}

#viewer {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  min-height: calc(100vh - 170px);
}

canvas {
  background: white;
  border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,.18);
  max-width: 100%;
  margin-bottom: 90px;
}

#viewer,
#pdfCanvas {
  touch-action: pan-y;
}

#loading {
  margin-top: 120px;
  font-size: 18px;
  color: #666;
  text-align: center;
  padding: 0 20px;
}

#loading.error {
  color: #ff3b30;
}

#retryBtn {
  display: none;
  margin: 16px auto 0;
}

#sidebar {
  position: fixed;
  top: 0;
  left: -320px;
  width: 300px;
  height: 100%;
  background: white;
  box-shadow: 4px 0 20px rgba(0,0,0,.2);
  z-index: 100;
  transition: .25s;
  overflow: auto;
  padding: 20px;
}

#sidebar.show { left: 0; }

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  display: none;
  z-index: 90;
}

#overlay.show { display: block; }

#toc button {
  width: 100%;
  margin: 8px 0;
  text-align: left;
  border-radius: 12px;
}

#toc button.active {
  background: #34c759;
  font-weight: 700;
}

.bottomBar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(12px);
  box-shadow: 0 -1px 10px rgba(0,0,0,.12);
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 12px;
}

/* 夜間模式 */
body.dark {
  background: #111;
  color: #fff;
}

body.dark #topbar,
body.dark .bottomBar,
body.dark #sidebar {
  background: #1b1b1b;
  color: #fff;
}

body.dark #viewer {
  background: #111;
}

body.dark #pageInfoRow {
  color: #ddd;
}

body.dark .progress {
  background: #333;
}

body.dark canvas {
  box-shadow: 0 0 20px rgba(255,255,255,.08);
  /* PDF 本身是白底,深色模式下做反色處理避免刺眼 */
  filter: invert(0.92) hue-rotate(180deg);
}

body.dark button.secondary {
  background: #333;
  color: #fff;
}

@media(max-width:700px){
  .toolbar { grid-template-columns: 1fr; }
  .leftTools, .rightTools { justify-content: center; }
  .centerTitle { margin: 6px 0; }
}
</style>
</head>

<body>

<div id="overlay" onclick="toggleMenu(false)"></div>

<div id="sidebar">
<h2>目錄</h2>

<div id="toc">
<button data-page="1" onclick="goPage(1)">封面</button>
<button data-page="5" onclick="goPage(5)">目錄</button>
<button data-page="10" onclick="goPage(10)">第一章</button>
<button data-page="52" onclick="goPage(52)">第二章</button>
<button data-page="79" onclick="goPage(79)">第三章</button>
<button data-page="99" onclick="goPage(99)">第四章</button>
<button data-page="107" onclick="goPage(107)">第五章</button>
<button data-page="122" onclick="goPage(122)">附錄</button>
</div>
</div>

<header id="topbar">
<div class="toolbar">

<div class="leftTools">
<button onclick="toggleMenu()">☰ 目錄</button>
<button class="secondary" onclick="location.href='index.html'">首頁</button>
<button class="secondary" onclick="toggleDark()">🌙</button>
</div>

<div class="centerTitle">DWM 圖解抗壓指南</div>

<div class="rightTools">
<button class="secondary" onclick="prevPage()">上一頁</button>
<button onclick="nextPage()">下一頁</button>
</div>

</div>

<div id="pageInfoRow">
  <span id="pageInfo">載入中...</span>
  <input id="pageJumpInput" type="number" min="1" aria-label="跳至頁碼">
  <button class="secondary" style="padding:4px 10px;font-size:13px;" onclick="jumpToInput()">跳頁</button>
</div>
<div class="progress"><div id="bar"></div></div>
</header>

<div id="viewer">
<div id="loading">PDF 載入中...
  <div><button id="retryBtn" class="secondary" onclick="loadPdf()">重新載入</button></div>
</div>
<canvas id="pdfCanvas" aria-label="DWM 圖解抗壓指南內容頁"></canvas>
</div>

<div class="bottomBar">
<button class="secondary" onclick="prevPage()">← 上一頁</button>
<button onclick="nextPage()">下一頁 →</button>
</div>

<script>
const pdfUrl = "pdf/DWM.pdf";
const STORAGE_PREFIX = "DWM_"; // 加前綴避免日後多本電子書共用網域時互相覆蓋

let pdfDoc = null;
let pageNum = Number(localStorage.getItem(STORAGE_PREFIX + "lastPage")) || 1;
let renderToken = 0; // 用於避免快速翻頁時舊的渲染結果蓋掉新的
const pageCache = new Map(); // 預載快取：pageNum -> PDFPageProxy

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const loading = document.getElementById("loading");
const retryBtn = document.getElementById("retryBtn");
const pageInfo = document.getElementById("pageInfo");
const pageJumpInput = document.getElementById("pageJumpInput");
const bar = document.getElementById("bar");

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

function loadPdf(){
  loading.style.display = "block";
  loading.classList.remove("error");
  loading.firstChild.textContent = "PDF 載入中...";
  retryBtn.style.display = "none";

  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf){
    pdfDoc = pdf;
    if(pageNum < 1) pageNum = 1;
    if(pageNum > pdfDoc.numPages) pageNum = pdfDoc.numPages;
    renderPage(pageNum);
  }).catch(function(err){
    console.error("PDF 載入失敗：", err);
    loading.classList.add("error");
    loading.firstChild.textContent = "PDF 載入失敗,請檢查網路連線後重試";
    retryBtn.style.display = "inline-block";
  });
}

function getPage(num){
  if(pageCache.has(num)) return pageCache.get(num);
  const p = pdfDoc.getPage(num);
  pageCache.set(num, p);
  return p;
}

function renderPage(num){
  const myToken = ++renderToken;
  loading.style.display = "block";
  loading.classList.remove("error");
  loading.firstChild.textContent = "PDF 載入中...";
  retryBtn.style.display = "none";

  getPage(num).then(function(page){
    if(myToken !== renderToken) return; // 已經被更新的翻頁請求取代，放棄這次渲染

    const rawViewport = page.getViewport({scale:1});
    let width = window.innerWidth * 0.95;
    if(window.innerWidth > 900){
      width = 900;
    }

    const scale = width / rawViewport.width;
    const viewport = page.getViewport({scale:scale});

    // 依裝置畫素密度提高實際繪製解析度，避免 Retina/高 DPI 螢幕模糊
    const dpr = window.devicePixelRatio || 1;
    canvas.width = viewport.width * dpr;
    canvas.height = viewport.height * dpr;
    canvas.style.width = viewport.width + "px";
    canvas.style.height = viewport.height + "px";

    ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置避免重複疊加 scale
    ctx.scale(dpr, dpr);

    page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise.then(function(){
      if(myToken !== renderToken) return;
      loading.style.display = "none";
      localStorage.setItem(STORAGE_PREFIX + "lastPage", num);
      updateProgress();
      updateTocHighlight();
      prefetchNextPage();
    });
  }).catch(function(err){
    if(myToken !== renderToken) return;
    console.error("頁面渲染失敗：", err);
    loading.classList.add("error");
    loading.firstChild.textContent = "本頁載入失敗,請重試";
    retryBtn.style.display = "inline-block";
  });
}

// 渲染目前頁時，背景預先抓取下一頁，翻頁時體感更快
function prefetchNextPage(){
  if(pageNum < pdfDoc.numPages){
    getPage(pageNum + 1);
  }
}

function updateProgress(){
  const percent = Math.round(pageNum / pdfDoc.numPages * 100);
  pageInfo.textContent = "第 " + pageNum + " / " + pdfDoc.numPages + " 頁　｜　" + percent + "%";
  pageJumpInput.placeholder = String(pageNum);
  bar.style.width = percent + "%";
}

// 依目前頁碼，高亮目錄中對應的章節按鈕
function updateTocHighlight(){
  const buttons = Array.from(document.querySelectorAll("#toc button"));
  const sorted = buttons
    .map(b => ({ btn: b, page: Number(b.dataset.page) }))
    .sort((a, b) => a.page - b.page);

  let activeBtn = sorted[0] ? sorted[0].btn : null;
  for(const item of sorted){
    if(pageNum >= item.page){
      activeBtn = item.btn;
    }
  }

  buttons.forEach(b => b.classList.remove("active"));
  if(activeBtn) activeBtn.classList.add("active");
}

function nextPage(){
  if(pdfDoc && pageNum < pdfDoc.numPages){
    pageNum++;
    renderPage(pageNum);
    window.scrollTo({top:0, behavior:"smooth"});
  }
}

function prevPage(){
  if(pdfDoc && pageNum > 1){
    pageNum--;
    renderPage(pageNum);
    window.scrollTo({top:0, behavior:"smooth"});
  }
}

function goPage(num){
  if(!pdfDoc) return;
  pageNum = Math.min(Math.max(1, num), pdfDoc.numPages);
  renderPage(pageNum);
  toggleMenu(false);
  window.scrollTo({top:0, behavior:"smooth"});
}

function jumpToInput(){
  const val = Number(pageJumpInput.value);
  if(!val || !pdfDoc) return;
  goPage(val);
  pageJumpInput.value = "";
}

pageJumpInput.addEventListener("keydown", function(e){
  if(e.key === "Enter") jumpToInput();
});

function toggleMenu(force){
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if(force === false){
    sidebar.classList.remove("show");
    overlay.classList.remove("show");
    return;
  }

  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem(STORAGE_PREFIX + "darkMode", document.body.classList.contains("dark"));
}

if(localStorage.getItem(STORAGE_PREFIX + "darkMode") === "true"){
  document.body.classList.add("dark");
}

window.addEventListener("resize", function(){
  clearTimeout(window.resizeTimer);
  window.resizeTimer = setTimeout(function(){
    if(pdfDoc) renderPage(pageNum);
  }, 300);
});

document.addEventListener("keydown", function(e){
  if(document.activeElement === pageJumpInput) return; // 在輸入頁碼時不要被方向鍵干擾

  if(e.key === "ArrowRight"){
    nextPage();
  }
  if(e.key === "ArrowLeft"){
    prevPage();
  }
  if(e.key === "Escape"){
    toggleMenu(false);
  }
});

/* ==========================
   手機左右滑動翻頁（保留雙指縮放）
========================== */

let touchStartX = 0;
let touchStartY = 0;
let touchMoved = false;
let isSingleTouch = false;

const viewer = document.getElementById("viewer");

viewer.addEventListener("touchstart", function(e){
  isSingleTouch = e.touches.length === 1;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, {passive:true});

viewer.addEventListener("touchmove", function(e){
  touchMoved = true;
  // 只有單指水平滑動才阻止預設行為（避免吃掉雙指縮放手勢）
  if(isSingleTouch && e.touches.length === 1){
    const diffX = e.touches[0].clientX - touchStartX;
    const diffY = e.touches[0].clientY - touchStartY;
    if(Math.abs(diffX) > Math.abs(diffY)){
      e.preventDefault();
    }
  }
}, {passive:false});

viewer.addEventListener("touchend", function(e){
  if(!isSingleTouch) return;

  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;

  const diffX = touchEndX - touchStartX;
  const diffY = touchEndY - touchStartY;

  if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX < 0) {
      nextPage();
    } else {
      prevPage();
    }
    return;
  }

  if (!touchMoved || (Math.abs(diffX) < 10 && Math.abs(diffY) < 10)) {
    toggleUI();
  }
});

/* ==========================
   點一下隱藏工具列
========================== */

let uiHidden = false;

function toggleUI(){
  const top = document.getElementById("topbar");
  const bottom = document.querySelector(".bottomBar");

  uiHidden = !uiHidden;

  top.style.display = uiHidden ? "none" : "";
  bottom.style.display = uiHidden ? "none" : "";
}

loadPdf();
</script>

</body>
</html>
