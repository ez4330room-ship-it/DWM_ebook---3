<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DWM 電子書</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", Arial, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #1c1c1e;
}

.card {
  width: 90%;
  max-width: 430px;
  background: white;
  border-radius: 24px;
  padding: 34px 26px;
  text-align: center;
  box-shadow: 0 18px 45px rgba(0,0,0,.16);
}

.badge {
  display: inline-block;
  background: #e8f0ff;
  color: #2563eb;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 14px;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.35;
}

.subtitle {
  margin: 12px 0 26px;
  color: #555;
  font-size: 16px;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 15px 18px;
  margin: 8px 0;
  background: #2563eb;
  color: white;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
}

button.secondary {
  background: #e5e7eb;
  color: #111827;
}

.progressText {
  margin-top: 22px;
  color: #555;
  font-size: 15px;
}

.progress {
  width: 100%;
  height: 10px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

#bar {
  width: 0%;
  height: 100%;
  background: #22c55e;
}

.footer {
  margin-top: 24px;
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>

<div class="card">

  <div class="badge">DWM 電子書</div>

  <h1>圖解抗壓指南</h1>

  <div class="subtitle">
    壓力之下，擇善而行
  </div>

  <button onclick="startReading()">
    開始閱讀
  </button>

  <button class="secondary" onclick="continueReading()">
    繼續閱讀
  </button>

  <div class="progressText" id="progressText">
    閱讀進度 0%
  </div>

  <div class="progress">
    <div id="bar"></div>
  </div>

  <div class="footer">
    自動記錄上次閱讀頁面
  </div>

</div>

<script>
const totalPages = 132;
const lastPage = Number(localStorage.getItem("lastPage")) || 1;
const percent = Math.round(lastPage / totalPages * 100);

document.getElementById("progressText").innerHTML =
  "閱讀進度 " + percent + "%（第 " + lastPage + " / " + totalPages + " 頁）";

document.getElementById("bar").style.width = percent + "%";

function startReading() {
  localStorage.setItem("lastPage", 1);
  location.href = "reader.html";
}

function continueReading() {
  location.href = "reader.html";
}
</script>

</body>
</html>
